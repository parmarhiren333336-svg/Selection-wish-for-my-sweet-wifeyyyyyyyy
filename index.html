<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Congratulations ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-ball">⚽</div>
        <h2>Loading Something Special...</h2>
    </div>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Main Content -->
    <main id="mainContent">

        <!-- Hero -->
        <section class="hero">

            <h3 class="small-title">
                A Special Message ❤️
            </h3>

            <h1 id="typing"></h1>

            <p class="subtitle">
                Congratulations on being selected for the Football Team! ⚽
            </p>

            <button id="startBtn">
                Open My Wish ❤️
            </button>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
